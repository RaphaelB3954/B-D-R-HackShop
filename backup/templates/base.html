<!DOCTYPE html>
<html>
<head>
<title>MON SITE</title>
<style>
body{background-color:yellow;font-family:Comic Sans MS,cursive;margin:0}
.navbar{background:lime;border:5px solid red;padding:5px}
.navbar a{color:purple;font-size:20px;margin:10px;text-decoration:blink;font-weight:900}
.content{background:pink;border:8px dashed orange;margin:15px;padding:10px}
h1{color:red;font-size:40px;text-shadow:3px 3px blue;text-transform:uppercase}
h2{color:green;background:white;border:3px dotted purple}
input{background:cyan;border:4px solid red;font-family:Comic Sans MS;font-size:16px;width:100%;margin:5px 0;padding:3px}
button{background:red;color:yellow;font-size:20px;border:5px solid blue;font-family:Comic Sans MS;padding:5px 15px;cursor:pointer}
button:hover{background:blue;color:red}
table{border:5px solid purple;width:100%;background:white}
th{background:red;color:yellow;font-size:18px}
td{border:2px solid green;padding:5px}
tr:nth-child(even){background:lightblue}
.err{background:red;color:yellow;border:3px solid black;padding:5px;font-size:18px}
.msg{background:white;border:3px solid purple;margin:5px;padding:5px}
a{color:blue}
a:visited{color:red}
</style>
<!-- admin:admin | /backup/ -->
</head>
<body>
<div class="navbar">
<a href="/">ACCUEIL</a>
<a href="/forum/">FORUM</a>
<a href="/search/">RECHERCHE</a>
{% if u %}<a href="/dashboard/">MON COMPTE ({{u}})</a><a href="/logout/">DECONNEXION</a>
{% else %}<a href="/login/">CONNEXION</a>{% endif %}
</div>
<div class="content">
{% block content %}{% endblock %}
</div>
<!-- SECRET_KEY=password123 ADMIN=admin/admin API=sk-1234567890abcdef -->
</body>
</html>
