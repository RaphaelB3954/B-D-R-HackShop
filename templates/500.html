{% extends 'base.html' %}

{% block title %}Erreur 500 - Erreur serveur{% endblock %}

{% block content %}
<section class="error-container">
    <div class="error-content">
        <h1 class="error-code">500</h1>
        <h2 class="error-title">Erreur serveur</h2>
        <p class="error-message">Une erreur est survenue. Essayez à nouveau plus tard.</p>
        <a href="/" class="btn-back">Retour à l'accueil</a>
    </div>
</section>

<style>
.error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 220px);
    padding: 40px 20px;
}

.error-content {
    text-align: center;
}

.error-code {
    font-size: 120px;
    font-weight: 300;
    color: var(--blue);
    margin: 0;
    letter-spacing: 2px;
}

.error-title {
    font-size: 36px;
    font-weight: 300;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
}

.error-message {
    font-size: 16px;
    font-weight: 300;
    color: var(--dark-gray);
    margin-bottom: 32px;
}

.btn-back {
    display: inline-block;
    background-color: var(--blue);
    color: var(--white);
    padding: 14px 32px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.btn-back:active {
    background-color: var(--black);
    color: var(--white);
}
</style>
{% endblock %}
